name: BotServer CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_BUILD_JOBS: 8
  CARGO_NET_RETRY: 10
  WORKSPACE: /opt/gbo/ci/botserver
  CARGO_TARGET_DIR: /opt/gbo/ci/botserver/target
  SCCACHE_DIR: /opt/gbo/cache/sccache
  RUSTC_WRAPPER: sccache
  CARGO_HOME: /opt/gbo/cache/cargo

jobs:
  build:
    runs-on: gbo

    steps:
      - name: Disable SSL verification and setup git
        run: |
          git config --global http.sslVerify false
          git config --global --add safe.directory "*"
          # Remove bad git config that replaces https with internal IP
          git config --global --unset-all url.http://10.16.164.222:4747/.insteadof || true

      - name: Fix git remote URLs
        run: |
          cd $WORKSPACE
          # Remove existing repos to force fresh clone with correct URLs
          rm -rf botlib botserver
          mkdir -p $SCCACHE_DIR
          mkdir -p $CARGO_HOME/registry

      - name: Setup Workspace
        run: |
          cd $WORKSPACE
          # Clone botlib
          git clone --depth 1 --branch main https://alm.pragmatismo.com.br/GeneralBots/botlib.git botlib
          # Clone botserver
          git clone --depth 1 --branch main https://alm.pragmatismo.com.br/GeneralBots/BotServer.git botserver
          # Get workspace Cargo.toml from gb and strip unused members
          git clone --depth 1 --branch main https://alm.pragmatismo.com.br/GeneralBots/gb.git /tmp/gb-ws
          cp /tmp/gb-ws/Cargo.toml Cargo.toml
          for m in botapp botdevice bottest botui botbook botmodels botplugin bottemplates; do
            grep -v "\"$m\"" Cargo.toml > /tmp/c.toml && mv /tmp/c.toml Cargo.toml
          done
          rm -rf /tmp/gb-ws

      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y libpq-dev libssl-dev liblzma-dev pkg-config

      - name: Build BotServer
        working-directory: /opt/gbo/ci/botserver
        run: |
          cargo build -p botserver --features chat -j 8 2>&1 | tee /tmp/build.log
          ls -lh target/debug/botserver
          sccache --show-stats || true

      - name: Save build log
        if: always()
        run: cp /tmp/build.log /tmp/botserver-$(date +%Y%m%d-%H%M%S).log || true

      - name: Setup incus on host
        run: |
          # SSH to host and setup incus for pushing to containers
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo cp /opt/incus/bin/incus /usr/local/bin/ && sudo chmod +x /usr/local/bin/incus"

      - name: Deploy via incus from host
        run: |
          set +e
          # SSH to host and deploy via incus
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- pkill -f botserver || true"
          sleep 2
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- rm -f /opt/gbo/bin/botserver"
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus file push /opt/gbo/ci/botserver/target/debug/botserver system/opt/gbo/bin/botserver"
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- chmod +x /opt/gbo/bin/botserver"
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- chown gbuser:gbuser /opt/gbo/bin/botserver"
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- su - gbuser -c 'cd /opt/gbo/bin && nohup ./botserver --noconsole >> /opt/gbo/logs/error.log 2>&1 &'"

      - name: Verify botserver started
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- pgrep -f botserver" && echo 'OK: botserver is running' || (echo 'ERROR: botserver not running' && ssh -o StrictHostKeyChecking=no administrator@63.141.255.9 "sudo incus exec system -- tail -20 /opt/gbo/logs/error.log" && exit 1)

      - name: Save deploy log
        if: always()
        run: cp /tmp/deploy.log /tmp/deploy-$(date +%Y%m%d-%H%M%S).log || true

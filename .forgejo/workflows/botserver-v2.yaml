# HASH-BUSTER-20260418-UNIQUE-ID-v4
# NOVO WORKFLOW - Forçar refresh do cache (v4 - corrige caminho do build)
name: BotServer CI/CD v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  SCCACHE_DIR: /opt/gbo/work/botserver/.sccache
  CARGO_TARGET_DIR: /opt/gbo/work/botserver/target

jobs:
  build:
    runs-on: gbo
    steps:
      - name: Setup Isolado
        run: |
          echo "=== Setup Inicial ==="
          mkdir -p $SCCACHE_DIR
          mkdir -p $CARGO_TARGET_DIR
          pkill -9 sccache || true
          echo "Setup concluído."

      - name: Pull Sources
        run: |
          echo "=== Atualizando Código ==="
          cd /opt/gbo/work/botserver
          git pull origin main
          echo "Código atualizado."

      - name: Build Debug
        run: |
          echo "=== Compilando (Debug) ==="
          cd /opt/gbo/work/botserver
          cargo build
          echo "Build finalizado."
